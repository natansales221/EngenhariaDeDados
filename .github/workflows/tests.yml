name: Testes do pipeline ETL

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Testes com Python 3.13
    runs-on: windows-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Atualizar o pip
        run: python -m pip install --upgrade pip

      - name: Instalar as dependências
        run: python -m pip install -r requirements.txt

      - name: Validar a sintaxe do projeto
        run: python -m compileall config src tests

      - name: Executar os testes automatizados
        run: python -m pytest -v